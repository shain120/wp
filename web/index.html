<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Futuristic cyberpunk portfolio built with React, Vite, Tailwind, Framer Motion, GSAP, and React Three Fiber."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Cyberpunk Portfolio</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 240, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #050505 0%, #0a1020 100%);
        color: #f8fafc;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .boot-message {
        width: min(680px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(18px);
      }

      .boot-message h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
      }

      .boot-message p {
        margin: 0 0 12px;
        line-height: 1.8;
        color: rgba(248, 250, 252, 0.82);
      }

      .boot-message code {
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(0, 240, 255, 0.12);
        color: #67e8f9;
      }
    </style>
    <script>
      if (window.location.protocol === "file:" && !window.location.pathname.includes("/dist/")) {
        window.location.replace(new URL("./dist/index.html", window.location.href).href);
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h1>Cyberpunk Portfolio</h1>
        <p>正在載入 React / Vite 應用程式。</p>
        <p>如果你是直接雙擊這個檔案，頁面會自動跳到 <code>dist/index.html</code>。</p>
        <p>如果沒有跳轉，請直接打開 <code>dist/index.html</code>，或在專案資料夾執行 <code>npm run dev</code>。</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
